name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            target: ''
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        shell: bash
        run: |
          npm ci || npm install
          npx tauri --version || (npm install @tauri-apps/cli && npx tauri --version)

      - name: Extract version from commit message
        id: version
        if: startsWith(github.event.head_commit.message, 'release')
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message"
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (release)
        if: steps.version.outputs.tag
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Yam ${{ steps.version.outputs.tag }}'
          releaseBody: 'Download Yam for your platform below.'
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Build Tauri app (verify only)
        if: "!steps.version.outputs.tag"
        shell: bash
        run: npx tauri build ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            target: ''
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        shell: bash
        run: |
          npm install
          npx tauri --version || (npm install @tauri-apps/cli && npx tauri --version)

      - name: Extract version from commit message
        id: version
        if: startsWith(github.event.head_commit.message, 'release')
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message"
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (release)
        if: steps.version.outputs.tag
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Yames ${{ steps.version.outputs.tag }}'
          releaseBody: 'Download Yames for your platform below.'
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Build Tauri app (verify only)
        if: "!steps.version.outputs.tag"
        shell: bash
        run: npx tauri build ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-pkg:
    needs: build
    if: startsWith(github.event.head_commit.message, 'release')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        run: sleep 30

      - name: Create postinstall script
        run: |
          mkdir -p scripts
          cat > scripts/postinstall << 'SCRIPT'
          #!/bin/bash
          xattr -cr "/Applications/Yames.app"
          SCRIPT
          chmod +x scripts/postinstall

      - name: Build ARM .pkg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARM_URL="https://github.com/turutupa/yames/releases/download/v${VERSION}/Yames_${VERSION}_aarch64.dmg"
          curl -fSL -o arm.dmg "$ARM_URL" --retry 5 --retry-delay 10
          hdiutil attach arm.dmg -nobrowse -mountpoint /Volumes/YamesARM
          mkdir -p pkg-root/Applications
          cp -R "/Volumes/YamesARM/Yames.app" pkg-root/Applications/
          hdiutil detach /Volumes/YamesARM
          pkgbuild --root pkg-root \
            --scripts scripts \
            --identifier com.yames.metronome \
            --version "$VERSION" \
            --install-location / \
            "Yames_${VERSION}_aarch64.pkg"
          rm -rf pkg-root

      - name: Build Intel .pkg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          INTEL_URL="https://github.com/turutupa/yames/releases/download/v${VERSION}/Yames_${VERSION}_x64.dmg"
          curl -fSL -o intel.dmg "$INTEL_URL" --retry 5 --retry-delay 10
          hdiutil attach intel.dmg -nobrowse -mountpoint /Volumes/YamesIntel
          mkdir -p pkg-root/Applications
          cp -R "/Volumes/YamesIntel/Yames.app" pkg-root/Applications/
          hdiutil detach /Volumes/YamesIntel
          pkgbuild --root pkg-root \
            --scripts scripts \
            --identifier com.yames.metronome \
            --version "$VERSION" \
            --install-location / \
            "Yames_${VERSION}_x64.pkg"
          rm -rf pkg-root

      - name: Upload .pkg to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "v${VERSION}" \
            "Yames_${VERSION}_aarch64.pkg" \
            "Yames_${VERSION}_x64.pkg" \
            --clobber

  update-homebrew:
    needs: [build, build-pkg]
    if: startsWith(github.event.head_commit.message, 'release')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        run: sleep 30

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARM_URL="https://github.com/turutupa/yames/releases/download/v${VERSION}/Yames_${VERSION}_aarch64.dmg"
          INTEL_URL="https://github.com/turutupa/yames/releases/download/v${VERSION}/Yames_${VERSION}_x64.dmg"

          echo "Downloading ARM DMG..."
          curl -fSL -o arm.dmg "$ARM_URL" --retry 5 --retry-delay 10
          ARM_SHA=$(shasum -a 256 arm.dmg | awk '{print $1}')
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"

          echo "Downloading Intel DMG..."
          curl -fSL -o intel.dmg "$INTEL_URL" --retry 5 --retry-delay 10
          INTEL_SHA=$(shasum -a 256 intel.dmg | awk '{print $1}')
          echo "intel_sha=$INTEL_SHA" >> "$GITHUB_OUTPUT"

          echo "ARM SHA256: $ARM_SHA"
          echo "Intel SHA256: $INTEL_SHA"

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.sha.outputs.intel_sha }}
        run: |
          cat > Casks/yames.rb << EOF
          cask "yames" do
            version "$VERSION"

            on_arm do
              url "https://github.com/turutupa/yames/releases/download/v#{version}/Yames_#{version}_aarch64.dmg"
              sha256 "$ARM_SHA"
            end

            on_intel do
              url "https://github.com/turutupa/yames/releases/download/v#{version}/Yames_#{version}_x64.dmg"
              sha256 "$INTEL_SHA"
            end

            name "Yames"
            desc "Yet Another Metronome Everyone Skips — musician-grade floating metronome"
            homepage "https://turutupa.github.io/yames/"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Yames.app"

            zap trash: [
              "~/Library/Application Support/com.yames.metronome",
              "~/Library/Caches/com.yames.metronome",
              "~/Library/Preferences/com.yames.metronome.plist",
            ]
          end
          EOF
          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' Casks/yames.rb

      - name: Push cask to homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PAT: ${{ secrets.WINGET_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/turutupa/homebrew-tap.git /tmp/homebrew-tap
          cp Casks/yames.rb /tmp/homebrew-tap/Casks/yames.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/yames.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update yames cask to v${VERSION}"
          git push

  update-winget:
    needs: build
    if: startsWith(github.event.head_commit.message, 'release')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version
        id: version
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        shell: bash
        run: sleep 30

      - name: Download EXE and compute SHA256
        id: sha
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $url = "https://github.com/turutupa/yames/releases/download/v$env:VERSION/Yames_${env:VERSION}_x64-setup.exe"
          Invoke-WebRequest -Uri $url -OutFile installer.exe -MaximumRetryCount 5
          $hash = (Get-FileHash installer.exe -Algorithm SHA256).Hash
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: Update winget manifest
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > winget/turutupa.yames.yaml << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.singleton.1.6.0.schema.json
          PackageIdentifier: turutupa.yames
          PackageVersion: $VERSION
          PackageLocale: en-US
          Publisher: turutupa
          PublisherUrl: https://github.com/turutupa
          PackageName: Yames
          PackageUrl: https://turutupa.github.io/yames/
          License: MIT
          LicenseUrl: https://github.com/turutupa/yames/blob/main/LICENSE
          ShortDescription: Yet Another Metronome Everyone Skips — musician-grade floating metronome
          Description: |-
            A free, open-source desktop metronome with an always-on-top floating widget,
            sub-millisecond audio precision, zen mode with immersive visuals, drill practice mode,
            tap tempo, and 10 beautiful themes.
          Tags:
            - metronome
            - music
            - rhythm
            - practice
            - bpm
            - tempo
          Installers:
            - Architecture: x64
              InstallerType: nsis
              InstallerUrl: https://github.com/turutupa/yames/releases/download/v${VERSION}/Yames_${VERSION}_x64-setup.exe
              InstallerSha256: $SHA256
          ManifestType: singleton
          ManifestVersion: 1.6.0
          EOF
          sed -i 's/^          //' winget/turutupa.yames.yaml

      - name: Commit and push updated winget manifest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add winget/turutupa.yames.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update winget manifest to v${{ steps.version.outputs.version }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed (attempt $i), retrying..."
            sleep 5
          done

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit PR to winget-pkgs
        continue-on-error: true
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $url = "https://github.com/turutupa/yames/releases/download/v$env:VERSION/Yames_${env:VERSION}_x64-setup.exe"
          .\wingetcreate.exe update turutupa.yames --version $env:VERSION --urls $url --submit --token $env:WINGET_PAT
